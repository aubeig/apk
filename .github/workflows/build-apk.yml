name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Rename APK
      run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Term.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Term
        path: app/build/outputs/apk/debug/Term.apk
